services:
  schichtplaner-db:
    image: postgres:16
    container_name: schichtplaner-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: schichtplaner
      POSTGRES_USER: schichtplaner
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - /mnt/Apps_Virtualization/compose/schichtplaner/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U schichtplaner -d schichtplaner"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  schichtplaner-web:
    build: .
    container_name: schichtplaner-web
    restart: unless-stopped
    ports:
      - "8090:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: Host=schichtplaner-db;Port=5432;Database=schichtplaner;Username=schichtplaner;Password=${DB_PASSWORD}
      SeedAdmin__Email: ${ADMIN_EMAIL}
      SeedAdmin__Password: ${ADMIN_PASSWORD}
    depends_on:
      schichtplaner-db:
        condition: service_healthy
